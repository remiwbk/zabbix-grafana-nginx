services:
  zabbix-postgres:
    image: postgres:15
    container_name: zabbix-postgres
    env_file:
      - .env
    volumes:
      - zbx_pgdata:/var/lib/postgresql/data
    networks:
      - zabbix-net
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:6.0-lts
    container_name: zabbix-server
    env_file:
      - .env
    environment:
      DB_SERVER_HOST: zabbix-postgres
      ZBX_VMWAREFORKS: ${ZBX_VMWAREFORKS}
    depends_on:
      - zabbix-postgres
    ports:
      - "${ZABBIX_SERVER_PORT}:10051"
    dns:
      - ${DNS_1}
      - ${DNS_2}
    networks:
      - zabbix-net
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:6.0-lts
    container_name: zabbix-web
    env_file:
      - .env
    environment:
      DB_SERVER_HOST: zabbix-postgres
      ZBX_SERVER_HOST: ${ZBX_SERVER_HOST}
      PHP_TZ: ${PHP_TZ}
    depends_on:
      - zabbix-server
    networks:
      - zabbix-net
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.25
    container_name: zabbix-reverse-proxy
    volumes:
      - ./reverse-proxy/conf.d:/etc/nginx/conf.d
      - ./reverse-proxy/certs:/etc/nginx/certs
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    depends_on:
      - zabbix-web
      - grafana
    networks:
      - zabbix-net
    command: >
      /bin/sh -c "envsubst < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2
    container_name: grafana
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - zabbix-net
    restart: unless-stopped

volumes:
  zbx_pgdata:
  grafana_data:

networks:
  zabbix-net:
    driver: bridge
